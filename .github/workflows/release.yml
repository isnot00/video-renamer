name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            output: video-renamer.exe

          - os: linux
            arch: amd64
            output: video-renamer-linux

          - os: darwin
            arch: amd64
            output: video-renamer-macos

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
          go build \
          -ldflags "-X renamer/internal/ui.Version=${{ github.ref_name }}" \
          -o ${{ matrix.output }} ./cmd

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.output }}