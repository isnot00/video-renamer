version: 2

project_name: video-renamer

builds:
  - id: video-renamer
    main: ./cmd
    binary: video-renamer

    goos:
      - windows
      - linux
      - darwin

    goarch:
      - amd64

    ldflags:
      - -s -w
      - -X renamer/internal/ui.Version={{ .Version }}

archives:
  - id: default

    formats:
      - zip

    name_template: >-
      {{ .ProjectName }}_
      {{ .Version }}_
      {{ .Os }}_
      {{ .Arch }}

checksum:
  name_template: checksums.txt

release:
  disable: true